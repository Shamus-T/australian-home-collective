<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="pantry-measure-title pantry-measure-desc">
  <title id="pantry-measure-title">Measure the usable space, not just the pantry cabinet</title>
  <desc id="pantry-measure-desc">A pantry cabinet measurement concept diagram with a front view showing outside width, internal width, usable opening, internal height, an open door and hinge intrusion, plus a side cutaway showing usable depth, shelf depth, an extended drawer, handle projection, pipework, skirting and plinth clearances.</desc>
  <defs>
    <style>
      .heading { font: 700 46px Inter, Arial, sans-serif; fill: #20302a; }
      .subheading { font: 400 24px Inter, Arial, sans-serif; fill: #526159; }
      .panel-title { font: 700 24px Inter, Arial, sans-serif; fill: #20302a; letter-spacing: .035em; }
      .label { font: 700 18px Inter, Arial, sans-serif; fill: #20302a; }
      .small { font: 500 17px Inter, Arial, sans-serif; fill: #526159; }
      .micro { font: 700 15px Inter, Arial, sans-serif; fill: #526159; letter-spacing: .025em; }
      .measure { stroke: #27758a; stroke-width: 3.5; fill: none; stroke-linecap: round; }
      .measure-green { stroke: #4f7f68; stroke-width: 3.5; fill: none; stroke-linecap: round; }
      .guide { stroke: #9fb8be; stroke-width: 2; stroke-dasharray: 6 6; }
      .cabinet { fill: #e9efec; stroke: #2b4038; stroke-width: 5; }
      .shelf { fill: #ffffff; stroke: #526159; stroke-width: 3; }
      .warning { fill: #f7e3dc; stroke: #b95f4e; stroke-width: 3; }
    </style>
    <marker id="arrow-blue-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#27758a" />
    </marker>
    <marker id="arrow-blue-end" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27758a" />
    </marker>
    <marker id="arrow-green-start" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#4f7f68" />
    </marker>
    <marker id="arrow-green-end" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4f7f68" />
    </marker>
    <marker id="arrow-red-end" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b95f4e" />
    </marker>
  </defs>

  <rect width="1440" height="960" fill="#f6f3eb" />
  <text x="70" y="72" class="heading">Measure the usable space — not just the cabinet</text>
  <text x="70" y="113" class="subheading">Open doors and drawers, then measure around every point that reduces access.</text>

  <!-- Front-view panel -->
  <rect x="60" y="148" width="660" height="720" rx="20" fill="#ffffff" stroke="#d9ded8" stroke-width="3" />
  <text x="92" y="190" class="panel-title">FRONT VIEW · OPENING + HINGES</text>

  <!-- Cabinet carcass and opening -->
  <rect x="152" y="254" width="410" height="430" rx="4" class="cabinet" />
  <rect x="184" y="286" width="346" height="366" fill="#fffdf8" stroke="#526159" stroke-width="3" />
  <rect x="184" y="386" width="346" height="18" rx="2" class="shelf" />
  <rect x="184" y="485" width="346" height="18" rx="2" class="shelf" />
  <rect x="184" y="584" width="346" height="18" rx="2" class="shelf" />

  <!-- Open right-hinged door, with handle on the free edge -->
  <path d="M 562 263 L 665 286 L 665 650 L 562 678 Z" fill="#4d7567" stroke="#29493e" stroke-width="5" stroke-linejoin="round" />
  <line x1="577" y1="282" x2="577" y2="658" stroke="#80a092" stroke-width="3" />
  <rect x="646" y="447" width="9" height="52" rx="4" fill="#e9efec" />
  <circle cx="558" cy="347" r="9" fill="#29493e" />
  <circle cx="558" cy="568" r="9" fill="#29493e" />
  <text x="619" y="470" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff" letter-spacing=".03em" transform="rotate(-90 619 470)">DOOR FULLY OPEN</text>

  <!-- Hinge plates intrude into the nominal internal width -->
  <path d="M 530 327 H 499 Q 484 327 484 342 V 358 Q 484 373 499 373 H 530 Z" class="warning" />
  <path d="M 530 548 H 499 Q 484 548 484 563 V 579 Q 484 594 499 594 H 530 Z" class="warning" />
  <text x="446" y="454" text-anchor="middle" class="micro" fill="#a44f41">HINGE PROJECTION</text>
  <path d="M 452 460 L 492 561" stroke="#b95f4e" stroke-width="3" fill="none" marker-end="url(#arrow-red-end)" />

  <!-- Outside carcass width -->
  <line x1="152" y1="226" x2="152" y2="250" class="guide" />
  <line x1="562" y1="226" x2="562" y2="250" class="guide" />
  <line x1="156" y1="232" x2="558" y2="232" class="measure" marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)" />
  <rect x="263" y="212" width="188" height="28" rx="14" fill="#edf5f7" />
  <text x="357" y="232" text-anchor="middle" class="micro" fill="#27758a">OUTSIDE CARCASS WIDTH</text>

  <!-- Internal width -->
  <line x1="184" y1="304" x2="184" y2="329" class="guide" />
  <line x1="530" y1="304" x2="530" y2="329" class="guide" />
  <line x1="188" y1="316" x2="526" y2="316" class="measure" marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)" />
  <rect x="292" y="324" width="130" height="27" rx="13" fill="#edf5f7" />
  <text x="357" y="344" text-anchor="middle" class="micro" fill="#27758a">INTERNAL WIDTH</text>

  <!-- Internal height -->
  <line x1="124" y1="286" x2="178" y2="286" class="guide" />
  <line x1="124" y1="652" x2="178" y2="652" class="guide" />
  <line x1="136" y1="290" x2="136" y2="648" class="measure" marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)" />
  <text x="110" y="469" text-anchor="middle" class="micro" fill="#27758a" transform="rotate(-90 110 469)">INTERNAL HEIGHT</text>

  <!-- Narrowest usable opening clears the hinge projection -->
  <line x1="184" y1="659" x2="184" y2="711" class="guide" />
  <line x1="484" y1="594" x2="484" y2="711" class="guide" />
  <line x1="188" y1="703" x2="480" y2="703" class="measure-green" marker-start="url(#arrow-green-start)" marker-end="url(#arrow-green-end)" />
  <rect x="218" y="716" width="236" height="31" rx="15" fill="#e9f1ed" />
  <text x="336" y="738" text-anchor="middle" class="micro" fill="#4f7f68">USABLE OPENING · HINGES CLEAR</text>

  <rect x="92" y="778" width="596" height="62" rx="13" fill="#eef3ef" />
  <text x="114" y="804" class="label">Record your own:</text>
  <text x="114" y="828" class="small">internal width · internal height · narrowest clear opening</text>

  <!-- Side-cutaway panel -->
  <rect x="745" y="148" width="635" height="720" rx="20" fill="#ffffff" stroke="#d9ded8" stroke-width="3" />
  <text x="777" y="190" class="panel-title">SIDE CUTAWAY · DEPTH + TRAVEL</text>

  <!-- Cabinet shell. Back is left; cabinet face and aisle are to the right. -->
  <rect x="807" y="254" width="338" height="430" rx="4" fill="#e9efec" stroke="#2b4038" stroke-width="5" />
  <rect x="836" y="286" width="279" height="366" fill="#fffdf8" stroke="#526159" stroke-width="3" />
  <text x="816" y="237" class="micro">BACK WALL</text>
  <text x="1119" y="237" text-anchor="middle" class="micro">CABINET FACE</text>

  <!-- Shelves finish short of the closed-door line -->
  <rect x="836" y="373" width="250" height="18" rx="2" class="shelf" />
  <rect x="836" y="455" width="250" height="18" rx="2" class="shelf" />
  <line x1="1115" y1="286" x2="1115" y2="652" stroke="#4d7567" stroke-width="10" />

  <!-- Usable internal depth -->
  <line x1="836" y1="302" x2="836" y2="341" class="guide" />
  <line x1="1110" y1="302" x2="1110" y2="341" class="guide" />
  <line x1="840" y1="319" x2="1106" y2="319" class="measure" marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)" />
  <rect x="885" y="327" width="176" height="28" rx="14" fill="#edf5f7" />
  <text x="973" y="347" text-anchor="middle" class="micro" fill="#27758a">USABLE INTERNAL DEPTH</text>

  <!-- Shelf depth -->
  <line x1="840" y1="405" x2="1082" y2="405" class="measure-green" marker-start="url(#arrow-green-start)" marker-end="url(#arrow-green-end)" />
  <rect x="904" y="413" width="114" height="27" rx="13" fill="#e9f1ed" />
  <text x="961" y="433" text-anchor="middle" class="micro" fill="#4f7f68">SHELF DEPTH</text>

  <!-- Pipework at the rear reduces the lower usable depth -->
  <path d="M 858 493 V 581 Q 858 596 873 596 H 920" fill="none" stroke="#b95f4e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M 858 493 V 581 Q 858 596 873 596 H 920" fill="none" stroke="#f7e3dc" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <text x="844" y="622" class="micro" fill="#a44f41">POSSIBLE PIPEWORK</text>

  <!-- Fully extended drawer remains supported inside the cabinet -->
  <rect x="987" y="502" width="341" height="82" rx="5" fill="#edf5f7" stroke="#27758a" stroke-width="4" />
  <rect x="987" y="502" width="28" height="82" fill="#d8e8ec" />
  <line x1="1002" y1="510" x2="1002" y2="576" stroke="#27758a" stroke-width="3" />
  <rect x="1328" y="489" width="24" height="108" rx="4" fill="#4d7567" stroke="#29493e" stroke-width="4" />
  <rect x="1352" y="526" width="18" height="34" rx="8" fill="#29493e" />
  <text x="1210" y="484" text-anchor="middle" class="micro" fill="#27758a">DRAWER FULLY EXTENDED</text>

  <!-- Drawer travel includes the projecting handle -->
  <line x1="1115" y1="603" x2="1115" y2="642" class="guide" />
  <line x1="1370" y1="564" x2="1370" y2="642" class="guide" />
  <line x1="1119" y1="625" x2="1366" y2="625" class="measure" marker-start="url(#arrow-blue-start)" marker-end="url(#arrow-blue-end)" />
  <text x="1244" y="653" text-anchor="middle" class="micro" fill="#27758a">DRAWER TRAVEL + HANDLE</text>

  <!-- Rear skirting and recessed front plinth/toe kick -->
  <path d="M 807 630 H 842 V 684 H 807 Z" fill="#d5ddd8" stroke="#526159" stroke-width="3" />
  <path d="M 1080 651 H 1145 V 684 H 1080 Z" fill="#d5ddd8" stroke="#526159" stroke-width="3" />
  <text x="830" y="713" text-anchor="middle" class="micro">SKIRTING</text>
  <text x="1113" y="713" text-anchor="middle" class="micro">PLINTH / TOE KICK</text>

  <!-- Tightest-point checklist -->
  <rect x="777" y="748" width="571" height="92" rx="14" fill="#29493e" />
  <circle cx="812" cy="784" r="19" fill="#f0b65c" />
  <path d="M 803 784 L 810 791 L 822 775" fill="none" stroke="#29493e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <text x="844" y="779" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">CHECK THE TIGHTEST POINT</text>
  <text x="844" y="808" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#dfe9e4">Hinges · shelf lips · pipes · skirting · projecting handles</text>
  <text x="844" y="830" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#dfe9e4">Record your usable measurements before choosing organisers.</text>

  <text x="70" y="923" class="small">Confirm product and installation requirements before buying.</text>
</svg>
