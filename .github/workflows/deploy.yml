name: Deploy website to VentraIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Astro and deploy by FTPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get latest code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Deploy dist folder to VentraIP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./
