name: Build and audit website

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-audit:
    name: Build and audit Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get latest code
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit commercial data
        run: npm run audit:commercial

      - name: Build website
        run: npm run build

      - name: Audit rendered site quality
        run: npm run audit:site:dist

      - name: Audit rendered commercial links
        run: npm run audit:commercial:dist
